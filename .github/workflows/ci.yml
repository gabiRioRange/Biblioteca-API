name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore APIBiblioteca.slnx

      - name: Build
        run: dotnet build APIBiblioteca.slnx --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test APIBiblioteca.Tests/APIBiblioteca.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./APIBiblioteca.Tests/TestResults/**/coverage.cobertura.xml
          flags: unittests
          fail_ci_if_error: false
